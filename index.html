<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIY VR Physics Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js for 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Cannon.js for Bonelab-style Physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    
    <!-- Firebase for Phone-to-PC connection -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Environment variables
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            // Add your own fallback firebase config here if running outside the platform
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'diy-vr-sandbox';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // State variables
        let user = null;
        let isHost = false;
        let roomCode = "";
        
        // 3D Variables
        let scene, camera, renderer, world;
        let physicsBodies = [];
        let renderMeshes = [];
        let leftControllerMesh, rightControllerMesh;

        // UI Elements
        const menuUI = document.getElementById('menu-ui');
        const gameUI = document.getElementById('game-ui');
        const statusText = document.getElementById('status-text');

        // 1. Initialize Auth First (MANDATORY)
        async function initAuth() {
            try {
                await signInAnonymously(auth);
            } catch (e) {
                console.error("Auth failed:", e);
                alert("Failed to connect to servers.");
            }
        }

        onAuthStateChanged(auth, (u) => {
            user = u;
            if(user) {
                document.getElementById('btn-host').disabled = false;
                document.getElementById('btn-join').disabled = false;
                statusText.innerText = "Connected to servers. Ready.";
            }
        });

        initAuth();

        // --- BUTTON HANDLERS ---
        document.getElementById('btn-host').addEventListener('click', () => {
            isHost = true;
            roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            setupHostRoom();
        });

        document.getElementById('btn-join').addEventListener('click', () => {
            isHost = false;
            roomCode = document.getElementById('room-input').value;
            if(roomCode.length === 4) {
                joinRoom();
            } else {
                alert("Please enter a 4 digit code.");
            }
        });

        // --- HOST (PC) LOGIC ---
        async function setupHostRoom() {
            if (!user) return;
            menuUI.classList.add('hidden');
            gameUI.classList.remove('hidden');
            document.getElementById('host-overlay').classList.remove('hidden');
            document.getElementById('display-code').innerText = roomCode;

            // Create room in Firestore
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'vrsessions_' + roomCode);
            await setDoc(roomRef, {
                hostId: user.uid,
                headsetReady: false,
                headsetRotation: { x: 0, y: 0, z: 0, w: 1 }
            });

            init3DPhysics();
            
            // Listen for headset rotation from phone
            onSnapshot(roomRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.headsetReady) {
                        document.getElementById('host-overlay').innerText = "Headset Connected! Look at your phone.";
                        // Apply phone rotation to PC camera
                        if(data.headsetRotation && camera) {
                            camera.quaternion.set(
                                data.headsetRotation.x,
                                data.headsetRotation.y,
                                data.headsetRotation.z,
                                data.headsetRotation.w
                            );
                        }
                    }
                }
            }, (error) => console.error("Snapshot error:", error));

            // Connect to local Python bridge for ESP32 controllers
            connectLocalControllers();
        }

        function connectLocalControllers() {
            // This connects to the python script running on the PC
            const ws = new WebSocket('ws://localhost:8080');
            ws.onopen = () => console.log("Connected to local controller bridge.");
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    // Update controller 1
                    if(data.c1 && leftControllerMesh) {
                        // Very basic mapping of gyro to rotation
                        leftControllerMesh.rotation.set(data.c1.gx * 0.01, data.c1.gy * 0.01, data.c1.gz * 0.01);
                    }
                    if(data.c2 && rightControllerMesh) {
                        rightControllerMesh.rotation.set(data.c2.gx * 0.01, data.c2.gy * 0.01, data.c2.gz * 0.01);
                    }
                } catch(e){}
            };
            ws.onerror = () => console.log("Make sure Python bridge is running for controllers!");
        }


        // --- HEADSET (PHONE) LOGIC ---
        async function joinRoom() {
            if (!user) return;
            
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'vrsessions_' + roomCode);
            const snap = await getDoc(roomRef);
            
            if (snap.exists()) {
                menuUI.classList.add('hidden');
                
                // Request gyroscope permissions (required on iOS)
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceOrientationEvent.requestPermission();
                        if (permissionState === 'granted') {
                            startPhoneVR(roomRef);
                        } else {
                            alert("Gyroscope access required for VR.");
                        }
                    } catch (e) {
                        console.error(e);
                    }
                } else {
                    // Non-iOS or older Android
                    startPhoneVR(roomRef);
                }
            } else {
                alert("Room not found!");
            }
        }

        function startPhoneVR(roomRef) {
            // Set ready flag
            setDoc(roomRef, { headsetReady: true }, { merge: true });

            // On phone, we just show a black screen or split view, and send gyro data
            document.body.innerHTML = `
                <div class="fixed inset-0 bg-black flex flex-col items-center justify-center text-white">
                    <h1 class="text-2xl font-bold text-green-500">VR Mode Active</h1>
                    <p class="mt-4">Keep phone in headset.</p>
                    <p class="text-xs text-gray-500 mt-8">Code: ${roomCode}</p>
                </div>
            `;

            // Setup local Three.js just to handle the complex Euler->Quaternion math easily
            const dummyCamera = new THREE.PerspectiveCamera();
            const euler = new THREE.Euler(0,0,0, 'YXZ');
            const quaternion = new THREE.Quaternion();

            window.addEventListener('deviceorientation', (event) => {
                let alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0; // Z
                let beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0; // X'
                let gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0; // Y''

                // Convert phone orientation to 3D world quaternion
                euler.set(beta, alpha, -gamma, 'YXZ');
                quaternion.setFromEuler(euler);

                // Throttle updates to Firebase slightly to prevent throttling issues
                // In a real production app, WebRTC data channels are used instead of Firestore
                setDoc(roomRef, {
                    headsetRotation: {
                        x: quaternion.x,
                        y: quaternion.y,
                        z: quaternion.z,
                        w: quaternion.w
                    }
                }, { merge: true });
            });
        }


        // --- 3D & PHYSICS ENGINE (HOST ONLY) ---
        function init3DPhysics() {
            // Three.js Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Sky blue
            scene.add(new THREE.AmbientLight(0x404040));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            scene.add(light);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0); // Average human height

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Cannon.js Physics World Setup
            world = new CANNON.World();
            world.gravity.set(0, -9.82, 0);
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 10;

            // Ground
            const groundMat = new CANNON.Material();
            const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: groundMat });
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);
            
            const groundMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(50, 50),
                new THREE.MeshStandardMaterial({ color: 0x555555 })
            );
            groundMesh.rotation.x = -Math.PI / 2;
            scene.add(groundMesh);

            // Spawn "Bonelab" style stackable boxes
            for(let i=0; i<20; i++) {
                createPhysicsBox(
                    Math.random() * 4 - 2, 
                    2 + i * 1.5, 
                    Math.random() * -4 - 2
                );
            }

            // Create mock hands (Controllers)
            const handGeo = new THREE.BoxGeometry(0.1, 0.1, 0.2);
            const handMatL = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const handMatR = new THREE.MeshStandardMaterial({ color: 0x0000ff });
            
            leftControllerMesh = new THREE.Mesh(handGeo, handMatL);
            leftControllerMesh.position.set(-0.3, 1.2, -0.5);
            scene.add(leftControllerMesh);

            rightControllerMesh = new THREE.Mesh(handGeo, handMatR);
            rightControllerMesh.position.set(0.3, 1.2, -0.5);
            scene.add(rightControllerMesh);

            // Start loop
            animate();
        }

        function createPhysicsBox(x, y, z) {
            const size = 0.5;
            // Physics
            const shape = new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2));
            const body = new CANNON.Body({ mass: 1, shape: shape });
            body.position.set(x, y, z);
            world.addBody(body);
            physicsBodies.push(body);

            // Graphics
            const geometry = new THREE.BoxGeometry(size, size, size);
            const material = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            renderMeshes.push(mesh);
        }

        const timeStep = 1 / 60;
        function animate() {
            requestAnimationFrame(animate);

            // Step Physics
            world.step(timeStep);

            // Sync Physics to Graphics
            for(let i=0; i<physicsBodies.length; i++) {
                renderMeshes[i].position.copy(physicsBodies[i].position);
                renderMeshes[i].quaternion.copy(physicsBodies[i].quaternion);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</head>
<body class="bg-gray-900 overflow-hidden font-sans">

    <!-- UI Overlay -->
    <div id="menu-ui" class="fixed inset-0 flex items-center justify-center bg-gray-900 text-white z-50">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-bold mb-2">DIY VR Sandbox</h1>
            <p id="status-text" class="text-sm text-yellow-400 mb-8">Connecting to network...</p>
            
            <div class="space-y-6">
                <div class="p-4 border border-gray-600 rounded-lg">
                    <h2 class="text-xl font-semibold mb-2">Play on PC</h2>
                    <p class="text-xs text-gray-400 mb-4">Host the physics engine on this device.</p>
                    <button id="btn-host" disabled class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-gray-600 py-3 rounded font-bold transition">
                        Start as Host
                    </button>
                </div>

                <div class="p-4 border border-gray-600 rounded-lg">
                    <h2 class="text-xl font-semibold mb-2">Use as Headset</h2>
                    <p class="text-xs text-gray-400 mb-4">Enter the code shown on your PC.</p>
                    <input id="room-input" type="number" placeholder="4-Digit Code" class="w-full bg-gray-700 text-center text-2xl py-2 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <button id="btn-join" disabled class="w-full bg-green-600 hover:bg-green-500 disabled:bg-gray-600 py-3 rounded font-bold transition">
                        Connect Phone
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="game-ui" class="hidden fixed top-4 left-4 z-40 text-white drop-shadow-md pointer-events-none">
        <div id="host-overlay" class="hidden bg-black/50 p-4 rounded-lg backdrop-blur-sm">
            <p class="text-sm uppercase tracking-wider text-gray-300">Room Code</p>
            <h2 id="display-code" class="text-5xl font-mono font-bold text-green-400">----</h2>
            <p class="text-xs mt-2 text-gray-300">Open this app on your phone and enter this code.</p>
        </div>
    </div>

</body>
</html>
